name: CD
on:
  push:
    tags:
    # use vMM.mm.pp to publish nonos (library) and cli-vMM.mm.pp to publish nonos-cli
    - v*
    - cli-v*
  pull_request:
    paths:
    - .github/workflows/cd.yml
    - .github/workflows/build-and-publish.yml
    - '*/**/pyproject.toml'
    - CITATION.cff
    - scripts/pre_publish_checks.py

permissions: {}

jobs:
  pre-publish-checks:
    runs-on: ubuntu-latest
    name: pre-publication checks
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false
    - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      with:
        enable-cache: false
    - run: uv run scripts/pre_publish_checks.py

  build-lib:
    name: Build lib package
    needs: [pre-publish-checks]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      with:
        enable-cache: false
    - name: Build distributions
      shell: bash -l {0}
      run: uv build --package nonos
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: artifacts-nonos
        path: dist

  publish-lib:
    name: Publish nonos release
    needs: [build-lib]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment:
      name: release-nonos
      url: https://pypi.org/p/nonos
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: artifacts-nonos
        path: dist

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  build-cli:
    name: Build CLI package
    needs: [pre-publish-checks]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      with:
        enable-cache: false
    - name: Build distributions
      shell: bash -l {0}
      run: uv build --package nonos-cli
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: artifacts-nonos-cli
        path: dist

  publish-cli:
    name: Publish nonos-cli release
    needs: [build-cli]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/cli-v') }}
    runs-on: ubuntu-latest
    environment:
      name: release-nonos-cli
      url: https://pypi.org/p/nonos-cli
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: artifacts-nonos-cli
        path: dist

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
